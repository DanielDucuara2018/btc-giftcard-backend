# ==============================================================================
# BTC Gift Card — Regtest override
#
# Switches the entire stack to a local, private Bitcoin chain where blocks are
# mined on demand.  No external sync, no faucets needed, coins are free.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.regtest.yml up -d
#
# Mine coins on demand (run after the stack is up):
#   ADDR=$(curl -s -X POST http://localhost:3202/api/node/wallet/address | jq -r .address)
#   docker compose -f docker-compose.yml -f docker-compose.regtest.yml \
#     exec bitcoind bitcoin-cli -regtest -rpcuser=btc -rpcpassword=btc \
#     generatetoaddress 101 "$ADDR"
#
# IMPORTANT: uses a separate lnd_data_regtest volume so testnet and regtest
# wallets never collide.  Run `docker compose ... down -v` before switching
# back to testnet to avoid stale volume issues.
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # bitcoind — full regtest node; required by LND in regtest mode since
  # neutrino does not support regtest.
  # ----------------------------------------------------------------------------
  bitcoind:
    image: ruimarinho/bitcoin-core:latest
    networks:
      gift_card_bridge:
        ipv4_address: 169.254.12.8
        aliases:
          - "gift-card-backend.bitcoind"
    command:
      - "-regtest"
      - "-server"
      - "-rpcuser=btc"
      - "-rpcpassword=btc"
      - "-rpcallowip=0.0.0.0/0"
      - "-rpcbind=0.0.0.0"
      - "-zmqpubrawblock=tcp://0.0.0.0:28332"
      - "-zmqpubrawtx=tcp://0.0.0.0:28333"
      - "-fallbackfee=0.0002"   # required for wallet ops in regtest
    ports:
      - "18443:18443"           # regtest RPC port
    healthcheck:
      test:
        - "CMD"
        - "bitcoin-cli"
        - "-regtest"
        - "-rpcuser=btc"
        - "-rpcpassword=btc"
        - "getblockchaininfo"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ----------------------------------------------------------------------------
  # lnd — override: regtest network, bitcoind backend instead of neutrino.
  # Uses a dedicated volume so the regtest wallet is isolated from testnet.
  # ----------------------------------------------------------------------------
  lnd:
    volumes:
      - lnd_data_regtest:/root/.lnd   # separate from the testnet lnd_data volume
    command:
      - "--bitcoin.regtest"
      - "--bitcoin.node=bitcoind"
      - "--bitcoind.rpchost=gift-card-backend.bitcoind"
      - "--bitcoind.rpcuser=btc"
      - "--bitcoind.rpcpass=btc"
      - "--bitcoind.zmqpubrawblock=tcp://gift-card-backend.bitcoind:28332"
      - "--bitcoind.zmqpubrawtx=tcp://gift-card-backend.bitcoind:28333"
      - "--rpclisten=0.0.0.0:10009"
      - "--restlisten=0.0.0.0:8080"
      - "--tlsextradomain=lnd"
      - "--tlsextradomain=gift-card-backend.lnd"
      - "--tlsextraip=169.254.12.7"
      - "--noseedbackup"
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          test -f /root/.lnd/tls.cert &&
          test -f /root/.lnd/data/chain/bitcoin/regtest/admin.macaroon
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    depends_on:
      bitcoind:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # App services — override: tell them the LND network is "regtest" so
  # macaroon path resolution uses the regtest chain directory.
  # ----------------------------------------------------------------------------
  app:
    environment:
      BTC_GIFTCARD_LND_NETWORK: regtest

  worker_fund_card:
    environment:
      BTC_GIFTCARD_LND_NETWORK: regtest

  worker_monitor_tx:
    environment:
      BTC_GIFTCARD_LND_NETWORK: regtest

  # ----------------------------------------------------------------------------
  # lnd_customer — simulates a customer's Lightning wallet in regtest.
  #
  # The Gifter operator (lnd) pays invoices generated by this node, enabling
  # full Lightning redemption tests without a real mobile wallet.
  #
  # Useful commands:
  #   # Generate a customer invoice for N sats:
  #   docker compose -f docker-compose.yml -f docker-compose.regtest.yml \
  #     exec lnd_customer lncli --network=regtest addinvoice --amt <sats>
  #
  #   # Check customer balance:
  #   docker compose -f docker-compose.yml -f docker-compose.regtest.yml \
  #     exec lnd_customer lncli --network=regtest channelbalance
  # ----------------------------------------------------------------------------
  lnd_customer:
    image: lightninglabs/lnd:v0.18.4-beta
    networks:
      gift_card_bridge:
        ipv4_address: 169.254.12.9
        aliases:
          - "gift-card-backend.lnd-customer"
    volumes:
      - lnd_data_regtest_customer:/root/.lnd
    command:
      - "--bitcoin.regtest"
      - "--bitcoin.node=bitcoind"
      - "--bitcoind.rpchost=gift-card-backend.bitcoind"
      - "--bitcoind.rpcuser=btc"
      - "--bitcoind.rpcpass=btc"
      - "--bitcoind.zmqpubrawblock=tcp://gift-card-backend.bitcoind:28332"
      - "--bitcoind.zmqpubrawtx=tcp://gift-card-backend.bitcoind:28333"
      - "--rpclisten=0.0.0.0:10009"
      - "--restlisten=0.0.0.0:8080"
      - "--tlsextradomain=gift-card-backend.lnd-customer"
      - "--tlsextraip=169.254.12.9"
      - "--noseedbackup"
      - "--listen=0.0.0.0:9735"
    ports:
      - "8082:8080"   # customer LND REST API — regtest only, used by regtest-setup.sh
    depends_on:
      bitcoind:
        condition: service_healthy

  lnd-creds-exporter:
    entrypoint:
    - sh
    - -c
    - |
      set -e
      echo "Copying LND credentials..."
      cp /root/.lnd/tls.cert /creds/tls.cert
      cp /root/.lnd/data/chain/bitcoin/regtest/admin.macaroon /creds/admin.macaroon
      chmod 644 /creds/tls.cert /creds/admin.macaroon
      echo "Credentials exported successfully."
    volumes:
      - lnd_data_regtest:/root/.lnd:ro

volumes:
  lnd_data_regtest:
  lnd_data_regtest_customer:
